<!doctype html>
<html>
  <head>
    <title>Book Reviews</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>

  <body>
    <header class="navbar">
      <!-- added: header/navigation bar -->
      <h1>Book Shelf</h1>
      <!-- modified: cleaner title for professional UI -->
    </header>

    <!-- Add a div to input book data -->
    <div id="addBook" class="form-section">
      <!-- added class for styling -->
      <h2>Add a Book</h2>
      <input type="text" id="bookTitle" placeholder="Book Title" />
      <input type="text" id="publicationYear" placeholder="Publication Year" />
      <input type="text" id="author" placeholder="Author Name" />
      <input type="text" id="image_url" placeholder="Image URL" />
      <button onclick="addBook()">Add</button>
    </div>

    <!-- Search -->
    <div class="form-section">
      <input
        type="text"
        id="searchBox"
        placeholder="Search by title or author"
      />
      <button onclick="searchBooks()">Search</button>
    </div>

    <!-- bookshelf area -->
    <!-- <div id="bookList" class="bookshelf"> modified: bookshelf grid container -->
    <!-- Book cards will appear here dynamically -->
    <!-- </div> -->

    <button id="showBooksButton" onclick="showAllBooks()">
      Show All Books
    </button>

    <div id="allbooks" class="bookshelf">
      <!-- modified: use grid layout here too -->
      <!-- Book cards will appear here dynamically -->
    </div>

    <div id="book-template" class="book" style="display: none">
      <img class="book-img" />
      <h3 class="book-title"></h3>
      <p class="book-author"></p>

      <div class="book-reviews" style="display: none"></div>
      <!-- Hidden by default -->

      <div class="book-actions">
        <!-- Buttons in one row -->
        <button class="view-btn">View Reviews</button>
        <button class="comment-btn">Add Review</button>
        <button class="delete-btn">Delete Review</button>
        <button class="delete-book-btn">Delete Book</button>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}?v=999"></script>
  </body>
</html>
